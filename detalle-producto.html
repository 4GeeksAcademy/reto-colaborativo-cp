<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <title>Detalle del producto | Maison Chic</title>
</head>

<body class="bg-stone-50 text-stone-900">
    <header class="border-b border-stone-200 bg-white/90 backdrop-blur">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="catalogo.html" class="text-2xl logo-font">Maison Chic</a>
            <a href="catalogo.html" class="text-sm text-stone-600 hover:text-stone-900 transition">← Volver al
                catálogo</a>
        </div>
    </header>

    <main id="detalleProducto" class="max-w-7xl mx-auto px-6 py-12"></main>

    <script>
        function formatearPrecio(precio) {
            return new Intl.NumberFormat('es-CL').format(precio);
        }

        function renderError(mensaje) {
            const contenedor = document.getElementById('detalleProducto');
            contenedor.innerHTML = `
                <section class="rounded-3xl border border-red-200 bg-white p-10 text-center shadow-sm">
                    <p class="text-sm uppercase tracking-[0.3em] text-red-500">Producto no disponible</p>
                    <h1 class="mt-4 text-3xl font-semibold">No pudimos cargar este producto</h1>
                    <p class="mt-3 text-stone-600">${mensaje}</p>
                    <a href="catalogo.html" class="inline-flex mt-8 rounded-full bg-stone-900 px-6 py-3 text-sm font-medium text-white hover:bg-stone-800 transition">
                        Volver al catálogo
                    </a>
                </section>
            `;
        }

        function renderProducto(producto) {
            const contenedor = document.getElementById('detalleProducto');
            const tallas = Array.isArray(producto.tallas) ? producto.tallas.join(' · ') : 'No informado';
            const materiales = producto.descripcion?.materiales || 'No informado';
            const uso = producto.descripcion?.uso || 'No informado';

            contenedor.innerHTML = `
                <section class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr] items-start">
                    <div class="overflow-hidden rounded-[2rem] border border-stone-200 bg-white shadow-[0_20px_60px_-35px_rgba(28,25,23,0.35)]">
                        <div class="bg-gradient-to-br from-stone-100 to-stone-200 p-6">
                            <img src="${producto.imagen}" alt="${producto.nombre}" class="w-full h-[520px] object-cover rounded-[1.5rem]">
                        </div>
                    </div>

                    <div class="rounded-[2rem] border border-stone-200 bg-white p-8 shadow-[0_20px_60px_-35px_rgba(28,25,23,0.35)]">
                        <p class="text-xs uppercase tracking-[0.35em] text-stone-500">${producto.categoria}</p>
                        <h1 class="mt-3 text-4xl font-semibold leading-tight">${producto.nombre}</h1>
                        <p class="mt-4 text-3xl font-medium text-stone-900">$${formatearPrecio(producto.precio)}</p>

                        <div class="mt-8 grid gap-4 sm:grid-cols-2">
                            <div class="rounded-2xl bg-stone-100 p-4">
                                <p class="text-xs uppercase tracking-[0.25em] text-stone-500">Código</p>
                                <p class="mt-2 text-lg font-medium">${producto.codigo}</p>
                            </div>
                            <div class="rounded-2xl bg-stone-100 p-4">
                                <p class="text-xs uppercase tracking-[0.25em] text-stone-500">Stock</p>
                                <p class="mt-2 text-lg font-medium">${producto.stock} unidades</p>
                            </div>
                        </div>

                        <section class="mt-8 border-t border-stone-200 pt-8">
                            <h2 class="text-lg font-semibold">Información detallada</h2>
                            <div class="mt-5 space-y-4 text-sm text-stone-700">
                                <div>
                                    <p class="font-medium text-stone-900">Materiales</p>
                                    <p class="mt-1">${materiales}</p>
                                </div>
                                <div>
                                    <p class="font-medium text-stone-900">Uso recomendado</p>
                                    <p class="mt-1">${uso}</p>
                                </div>
                                <div>
                                    <p class="font-medium text-stone-900">Tallas disponibles</p>
                                    <p class="mt-1">${tallas}</p>
                                </div>
                            </div>
                        </section>

                        <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                            <a href="catalogo.html" class="inline-flex items-center justify-center rounded-full border border-stone-300 px-6 py-3 text-sm font-medium text-stone-900 hover:border-stone-900 transition">
                                Seguir viendo productos
                            </a>
                            <a href="carrito.html" class="inline-flex items-center justify-center rounded-full bg-stone-900 px-6 py-3 text-sm font-medium text-white hover:bg-stone-800 transition">
                                Ir al carrito
                            </a>
                        </div>
                    </div>
                </section>
            `;
        }

        async function cargarDetalleProducto() {
            const params = new URLSearchParams(window.location.search);
            const id = Number(params.get('id'));

            if (!id) {
                renderError('El enlace no incluye un identificador de producto válido.');
                return;
            }

            try {
                const res = await fetch('./productos.json');
                const productos = await res.json();
                const producto = productos.find(item => item.id === id);

                if (!producto) {
                    renderError('No encontramos información para el producto solicitado.');
                    return;
                }

                renderProducto(producto);
            } catch (error) {
                console.error('Error cargando el detalle del producto:', error);
                renderError('Ocurrió un error al cargar los datos del producto.');
            }
        }

        document.addEventListener('DOMContentLoaded', cargarDetalleProducto);
    </script>
</body>

</html>
